<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обратный отсчет</title>

<style>

@font-face {
  font-family: "MyFont";
  src: url("font/MyFont.ttf");
}


html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: black;
}


body {
  min-height: 100vh;
  min-height: 100dvh;
}


/* ВИДЕО */
video.bg {

  position: fixed;
  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  object-fit: cover;

  opacity: 0;

  transition: opacity 2s ease;

  z-index: 0;
}


video.bg.show {

  opacity: 1;

}


/* ЧЁРНЫЙ ФОН */
.overlay {

  position: fixed;

  inset: 0;

  background: black;

  z-index: 1;

  opacity: 1;

  transition: opacity 2s ease;

}


.overlay.hide {

  opacity: 0;

  pointer-events: none;

}



/* ТАЙМЕР */
.timer {

  position: fixed;

  inset: 0;

  display: flex;

  justify-content: center;

  align-items: center;


  color: white;

  font-family: "MyFont", sans-serif;

  font-size: clamp(34px, 7.2vw, 94px);


  text-align: center;


  -webkit-text-stroke: 1px black;


  text-shadow:

    0 0 6px rgba(0,0,0,0.6),

    0 0 12px rgba(255,255,255,0.25);


  z-index: 2;


  opacity: 0;

  transition: opacity 2s ease;


  transform: translateY(-8%);

}



.timer.show {

  opacity: 1;

}



/* СТАРТОВЫЕ НАДПИСИ */
.start-screen {

  position: fixed;

  inset: 0;


  display: flex;

  flex-direction: column;

  justify-content: center;

  align-items: center;


  color: white;


  font-family: "MyFont", sans-serif;


  text-align: center;


  z-index: 3;


  opacity: 1;

  transition: opacity 2s ease;

}



.start-screen.hide {

  opacity: 0;

  pointer-events: none;

}



/* СТАРТОВЫЕ НАДПИСИ */
.start-title {

  font-size: clamp(28px, 5vw, 60px);

  -webkit-text-stroke: 1px black;

  text-shadow:
    0 0 6px rgba(0,0,0,0.6),
    0 0 12px rgba(255,255,255,0.25);

  animation: titlePulse 3.5s ease-in-out infinite;
}

.start-subtitle {

  margin-top: 25px;

  width: 85%;

  font-size: clamp(16px, 2.8vw, 32px);

  opacity: 0.9;

  -webkit-text-stroke: 0.5px black;

  text-shadow:
    0 0 6px rgba(0,0,0,0.6),
    0 0 10px rgba(255,255,255,0.2);

  animation: titlePulse 3.5s ease-in-out infinite;
  animation-delay: .5s;
}

/* Анимация "живого" текста */
@keyframes titlePulse {

  0%,
  100% {
    transform: scale(1);
    opacity: .92;
    text-shadow:
      0 0 6px rgba(0,0,0,0.6),
      0 0 12px rgba(255,255,255,0.25);
  }

  50% {
    transform: scale(1.03);
    opacity: 1;
    text-shadow:
      0 0 8px rgba(0,0,0,0.6),
      0 0 24px rgba(255,255,255,0.55);
  }
}


</style>

</head>


<body>


<!-- ВИДЕО -->

<video class="bg" autoplay muted loop playsinline>

  <source src="video/background.mp4" type="video/mp4">

</video>



<!-- ЧЁРНЫЙ ФОН -->

<div class="overlay" id="overlay"></div>



<!-- СТАРТОВЫЕ НАДПИСИ -->

<div class="start-screen" id="startScreen">


  <div class="start-title">

    Нажмите в любом месте экрана, чтобы начать

  </div>


  <div class="start-subtitle">

    Для полного погружения переверните ваше устройство горизонтально

  </div>


</div>



<!-- МУЗЫКА -->

<audio id="music" loop>

  <source src="audio/music.mp3" type="audio/mpeg">

</audio>



<!-- ТАЙМЕР -->

<div class="timer" id="timer">

  Загрузка...

</div>



<script>


const targetDate =
  new Date("2026-12-31T00:00:00").getTime();



function updateTimer() {


  const now = Date.now();


  const diff = targetDate - now;



  if (diff <= 0) {


    document.getElementById("timer").textContent =
      "Время вышло!";


    return;

  }



  const days =
    Math.floor(diff / 86400000);



  const hours =
    Math.floor((diff % 86400000) / 3600000);



  const minutes =
    Math.floor((diff % 3600000) / 60000);



  const seconds =
    Math.floor((diff % 60000) / 1000);



  document.getElementById("timer").textContent =

    `${days}д ${hours}ч ${minutes}м ${seconds}с`;

}



updateTimer();

setInterval(updateTimer, 1000);



const overlay =
  document.getElementById("overlay");


const startScreen =
  document.getElementById("startScreen");


const music =
  document.getElementById("music");


const video =
  document.querySelector("video.bg");


const timer =
  document.getElementById("timer");




document.addEventListener("click", () => {



  // исчезновение стартовых надписей

  startScreen.classList.add("hide");



  // появление видео

  video.classList.add("show");



  // исчезновение чёрного фона

  overlay.classList.add("hide");



  // таймер появляется только после окончания перехода

  setTimeout(() => {


    timer.classList.add("show");


  }, 2000);




  // запуск музыки

  music.volume = 0.5;


  music.play().catch(() => {});



}, { once: true });



</script>


</body>
</html>

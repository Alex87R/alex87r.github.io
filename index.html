<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таймер</title>

<style>
@font-face {
    font-family: "MyFont";
    src: url("font/MyFont.ttf");
}

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* Видео */
video.bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
}

/* Чёрный экран */
.overlay {
    position: fixed;
    inset: 0;
    background: black;
    opacity: 1;
    transition: opacity 2s ease;
    z-index: 1;
}

.overlay.hide {
    opacity: 0;
    pointer-events: none;
}

/* Таймер */
.timer {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -60%);

    color: white;
    font-family: "MyFont", sans-serif;
    font-size: clamp(34px, 7.2vw, 94px);

    text-align: center;

    -webkit-text-stroke: 1px black;

    text-shadow:
        0 0 6px rgba(0,0,0,.6),
        0 0 12px rgba(255,255,255,.25);

    opacity: 0;
    animation: fadeInUp 1.5s ease forwards;

    z-index: 2;
}

@keyframes fadeInUp {
    to {
        opacity: 1;
        transform: translate(-50%, -50%);
    }
}

/* Подсказка */
.hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);

    color: white;
    font-family: Arial, sans-serif;
    font-size: 14px;
    opacity: .75;
    text-align: center;

    transition: opacity .5s;

    z-index: 3;
}
</style>
</head>

<body>

<!-- Видео -->
<video class="bg" autoplay muted loop playsinline>
    <source src="video/background.mp4" type="video/mp4">
</video>

<!-- Чёрный экран -->
<div class="overlay" id="overlay"></div>

<!-- Музыка -->
<audio id="music" loop>
    <source src="audio/music.mp3" type="audio/mpeg">
</audio>

<!-- Таймер -->
<div class="timer" id="timer">Загрузка...</div>

<!-- Подсказка -->
<div class="hint" id="hint">
    Нажмите в любом месте экрана, чтобы начать
</div>

<script>
const targetDate = new Date("2026-12-31T00:00:00").getTime();

function updateTimer() {
    const now = Date.now();
    const diff = targetDate - now;

    if (diff <= 0) {
        document.getElementById("timer").textContent = "Время вышло!";
        return;
    }

    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);

    document.getElementById("timer").textContent =
        `${days}д ${hours}ч ${minutes}м ${seconds}с`;
}

updateTimer();
setInterval(updateTimer, 1000);

const overlay = document.getElementById("overlay");
const hint = document.getElementById("hint");
const music = document.getElementById("music");

document.addEventListener("click", () => {

    overlay.classList.add("hide");

    hint.style.opacity = "0";

    setTimeout(() => {
        hint.style.display = "none";
    }, 500);

    music.play().catch(() => {});

}, { once: true });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Skyrim Countdown</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script type="module" src="js/app.js"></script>
</head>
<body>
<div id="background"></div>
<div id="overlay"></div>

<main id="app">
<header id="header">
<img id="logo" src="assets/logo.svg">
<h1 id="title">SKYRIM COUNTDOWN</h1>
<p id="subtitle">Until The Elder Scrolls VI</p>
</header>

<section id="countdown">
<span id="days"></span>
<span id="hours"></span>
<span id="minutes"></span>
<span id="seconds"></span>
</section>

<section id="status"><p id="status-text"></p></section>
</main>

<nav id="controls">
<button id="musicButton"></button>
<button id="volumeButton"></button>
<button id="fullscreenButton"></button>
</nav>

<audio id="music" loop></audio>
</body>
</html>

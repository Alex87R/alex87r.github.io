<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обратный отсчет</title>

<style>
@font-face {
  font-family: "MyFont";
  src: url("font/MyFont.ttf");
}

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: black;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
}

/* ВИДЕО */
video.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;

  opacity: 0;
  transition: opacity 2s ease;

  z-index: 0;
}

video.bg.show {
  opacity: 1;
}

/* ЧЁРНЫЙ ЭКРАН */
.overlay {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 1;

  opacity: 1;
  transition: opacity 2s ease;
}

.overlay.hide {
  opacity: 0;
  pointer-events: none;
}

/* Обратный отсчет */
.timer {
  position: fixed;
  inset: 0;

  display: flex;
  justify-content: center;
  align-items: center;

  color: white;
  font-family: "MyFont", sans-serif;
  font-size: clamp(34px, 7.2vw, 94px);

  text-align: center;

  -webkit-text-stroke: 1px black;

  text-shadow:
    0 0 6px rgba(0,0,0,0.6),
    0 0 12px rgba(255,255,255,0.25);

  z-index: 2;

  opacity: 0;
  animation: fadeInUp 1.5s ease forwards;

  transform: translateY(-8%);
}

/* ПОДСКАЗКА */
.hint {
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%);

  width: 90%;
  text-align: center;

  color: white;
  font-family: Arial, sans-serif;
  font-size: 14px;
  opacity: 0.7;

  z-index: 2;

  transition: opacity 0.8s ease;
}

/* АНИМАЦИЯ */
@keyframes fadeInUp {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>

<body>

<!-- ВИДЕО -->
<video class="bg" autoplay muted loop playsinline>
  <source src="video/background.mp4" type="video/mp4">
</video>

<!-- ЧЁРНЫЙ ФОН -->
<div class="overlay" id="overlay"></div>

<!-- МУЗЫКА -->
<audio id="music" loop>
  <source src="audio/music.mp3" type="audio/mpeg">
</audio>

<!-- ТАЙМЕР -->
<div class="timer" id="timer">Загрузка...</div>

<!-- ПОДСКАЗКА -->
<div class="hint" id="hint">
  Нажмите в любом месте экрана, чтобы включить звук 🔊
</div>

<script>

const targetDate = new Date("2026-12-31T00:00:00").getTime();

function updateTimer() {
  const now = Date.now();
  const diff = targetDate - now;

  if (diff <= 0) {
    document.getElementById("timer").textContent = "Время вышло!";
    return;
  }

  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);

  document.getElementById("timer").textContent =
    `${days}д ${hours}ч ${minutes}м ${seconds}с`;
}

updateTimer();
setInterval(updateTimer, 1000);

const overlay = document.getElementById("overlay");
const hint = document.getElementById("hint");
const music = document.getElementById("music");
const video = document.querySelector("video.bg");

document.addEventListener("click", () => {

  video.classList.add("show");
  overlay.classList.add("hide");

  hint.style.opacity = "0";
  setTimeout(() => hint.style.display = "none", 800);

  music.volume = 0.5;
  music.play().catch(() => {});

}, { once: true });

</script>

</body>
</html>

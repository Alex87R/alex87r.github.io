<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Video</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    video.bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain; /* без увеличения и обрезки */
      z-index: -1;
    }
  </style>
</head>

<body>

  <!-- путь к видео в папке video -->
  <video class="bg" autoplay muted loop playsinline>
    <source src="video/background.mp4" type="video/mp4">
  </video>

</body>
</html>

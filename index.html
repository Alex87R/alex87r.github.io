<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Видео фон</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      height: 100vh;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* как background-size: cover */
      z-index: -1;
    }

    .content {
      position: relative;
      z-index: 1;
      color: white;
      padding: 20px;
    }
  </style>
</head>

<body>

  <video class="video-bg" autoplay muted loop playsinline>
    <source src="video/background.mp4" type="video/mp4">
    Ваш браузер не поддерживает видео.
  </video>

  <div class="content">
    <h1>Заголовок</h1>
    <p>Текст поверх видео-фона</p>
  </div>

</body>
</html>

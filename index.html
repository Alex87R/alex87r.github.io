<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обратный отсчет</title>

<style>
@font-face {
  font-family: "MyFont";
  src: url("font/MyFont.ttf");
}

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: black;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
}

video.bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  object-fit:cover;opacity:0;transition:opacity 2s ease;z-index:0;
}
video.bg.show{opacity:1;}

.overlay{
  position:fixed;inset:0;background:black;z-index:1;opacity:1;
  transition:opacity 3s ease-in-out;
}
.overlay.hide{opacity:0;pointer-events:none;}

.timer{
  position:fixed;inset:0;display:flex;justify-content:center;align-items:center;
  color:#fff;font-family:"MyFont",sans-serif;
  font-size:clamp(34px,7.2vw,94px);
  text-align:center;
  -webkit-text-stroke:1px black;
  text-shadow:0 0 6px rgba(0,0,0,.6),0 0 12px rgba(255,255,255,.25);
  z-index:2;opacity:0;transition:opacity 2s ease;
  transform:translateY(-8%);
}
.timer.show{opacity:1;}

.start-screen{
  position:fixed;inset:0;display:flex;flex-direction:column;
  justify-content:center;align-items:center;color:#fff;
  font-family:"MyFont",sans-serif;text-align:center;
  z-index:3;opacity:1;transition:opacity 3s ease-in-out;
  animation:none;transform:none;
}
.start-screen.hide{opacity:0;pointer-events:none;}

.start-title{
  width:min(90vw,1000px);padding:0 20px;box-sizing:border-box;
  font-size:clamp(24px,5vw,60px);line-height:1.25;color:#fff;
  -webkit-text-stroke:0;text-shadow:none;white-space:normal;
  overflow-wrap:break-word;word-break:normal;
}
.start-subtitle{
  margin-top:22px;width:min(90vw,900px);padding:0 20px;
  box-sizing:border-box;font-size:clamp(15px,2.7vw,30px);
  line-height:1.45;color:#fff;opacity:.9;
  -webkit-text-stroke:0;text-shadow:none;
  white-space:normal;overflow-wrap:break-word;word-break:normal;
}
@media (max-width:768px){
.start-title{width:92vw;font-size:clamp(22px,7vw,40px);}
.start-subtitle{width:92vw;margin-top:18px;font-size:clamp(14px,4vw,22px);}
}
</style>
</head>
<body>
<video class="bg" muted loop playsinline preload="none"><source src="video/background.mp4" type="video/mp4"></video>
<div class="overlay" id="overlay"></div>
<div class="start-screen" id="startScreen">
<div class="start-title">Нажмите в любом месте экрана, чтобы начать</div>
<div class="start-subtitle">Для полного погружения переверните ваше устройство горизонтально</div>
</div>
<audio id="music" loop><source src="audio/music.mp3" type="audio/mpeg"></audio>
<div class="timer" id="timer">Загрузка...</div>
<script>
const targetDate=new Date("2026-12-31T00:00:00").getTime();
function updateTimer(){
 const diff=targetDate-Date.now();
 if(diff<=0){timer.textContent="Время вышло!";return;}
 const d=Math.floor(diff/86400000),h=Math.floor(diff%86400000/3600000),
 m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);
 timer.textContent=`${d}д ${h}ч ${m}м ${s}с`;
}
const overlay=document.getElementById("overlay");
const startScreen=document.getElementById("startScreen");
const music=document.getElementById("music");
const video=document.querySelector("video.bg");
const timer=document.getElementById("timer");
updateTimer();setInterval(updateTimer,1000);
document.addEventListener("click",()=>{
 startScreen.classList.add("hide");
 video.play().then(()=>video.classList.add("show")).catch(()=>{});
 overlay.classList.add("hide");
 setTimeout(()=>timer.classList.add("show"),3000);
 music.volume=0.5;music.play().catch(()=>{});
},{once:true});
</script>
</body>
</html>

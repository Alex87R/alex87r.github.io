<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таймер</title>

<style>

@font-face{
    font-family:"MyFont";
    src:url("font/MyFont.ttf");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* Видео */
video.bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

/* Контейнер таймера */
.timer-container{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    transform:translateY(-10vh);

    pointer-events:none;

    z-index:2;
}

/* Таймер */
.timer{

    font-family:"MyFont",sans-serif;
    color:#fff;

    font-size:clamp(34px,7.2vw,94px);

    text-align:center;

    -webkit-text-stroke:1px #000;

    text-shadow:
        0 0 6px rgba(0,0,0,.6),
        0 0 12px rgba(255,255,255,.25),
        0 0 20px rgba(255,255,255,.18);

    opacity:0;

    animation:timerAppear 1.5s ease-out forwards;
}

@keyframes timerAppear{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* Подсказка */
.hint{

    position:fixed;

    left:50%;
    bottom:20px;

    transform:translateX(-50%);

    color:#fff;
    font-family:Arial,sans-serif;
    font-size:14px;

    opacity:.75;

    transition:.5s;

    z-index:3;
}

@media (max-width:600px){

    .timer-container{
        transform:translateY(-8vh);
    }

    .hint{
        width:90%;
        text-align:center;
        font-size:13px;
    }

}

</style>
</head>

<body>

<!-- Видео -->
<video class="bg" autoplay muted loop playsinline>
    <source src="video/background.mp4" type="video/mp4">
</video>

<!-- Музыка -->
<audio id="music" loop>
    <source src="audio/music.mp3" type="audio/mpeg">
</audio>

<!-- Таймер -->
<div class="timer-container">
    <div class="timer" id="timer">Загрузка...</div>
</div>

<!-- Подсказка -->
<div class="hint" id="hint">
    Нажмите в любом месте экрана, чтобы включить звук 🔊
</div>

<script>

const targetDate = new Date("2026-12-31T00:00:00").getTime();

function updateTimer(){

    const now = Date.now();
    const diff = targetDate - now;

    if(diff<=0){
        document.getElementById("timer").textContent="Время вышло!";
        return;
    }

    const days=Math.floor(diff/86400000);
    const hours=Math.floor((diff%86400000)/3600000);
    const minutes=Math.floor((diff%3600000)/60000);
    const seconds=Math.floor((diff%60000)/1000);

    document.getElementById("timer").textContent=
        `${days}д ${hours}ч ${minutes}м ${seconds}с`;

}

updateTimer();
setInterval(updateTimer,1000);

const music=document.getElementById("music");
const hint=document.getElementById("hint");

document.addEventListener("click",()=>{

    music.volume=0.5;
    music.play().catch(()=>{});

    hint.style.opacity="0";

    setTimeout(()=>{
        hint.style.display="none";
    },500);

},{once:true});

</script>

</body>
</html>

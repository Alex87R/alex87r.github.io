<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Видео фон</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* как background-size: cover */
      z-index: -1;
    }

    .content {
      position: relative;
      z-index: 1;
      color: white;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>

  <video class="bg-video" autoplay muted loop playsinline>
    <source src="video/background.mp4" type="video/mp4">
  </video>

  <div class="content">
    <h1>Текст поверх видео</h1>
    <p>Ваш контент здесь</p>
  </div>

</body>
</html>

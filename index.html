<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Background Video</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }

  .video-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
  }

  .video-bg video {
    width: 100%;
    height: 100%;
    object-fit: contain; /* без увеличения и обрезки */
    background: black;
  }

  .content {
    position: relative;
    z-index: 1;
    color: white;
    text-align: center;
    top: 40%;
    font-size: 2rem;
  }
</style>
</head>

<body>

<div class="video-bg">
  <video autoplay muted loop playsinline>
    <source src="video/background.mp4" type="video/mp4">
  </video>
</div>

<div class="content">
  Ваш контент
</div>

</body>
</html>

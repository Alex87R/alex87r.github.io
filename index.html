<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Таймер</title>

<style>
@font-face {
  font-family: "MyFont";
  src: url("font/MyFont.ttf");
}

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

/* видео фон */
video.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* таймер */
.timer {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -60%);

  color: white;
  font-family: "MyFont", sans-serif;

  /* +20% размер */
  font-size: clamp(34px, 7.2vw, 94px);

  text-align: center;

  /* обводка */
  -webkit-text-stroke: 1px black;

  /* свечение + тень */
  text-shadow:
    0 0 6px rgba(0,0,0,0.6),
    0 0 12px rgba(255,255,255,0.25);

  opacity: 0;
  animation: fadeInUp 1.5s ease forwards;
}

/* анимация появления */
@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translate(-50%, -50%);
  }
}

/* адаптация под телефон */
@media (max-width: 600px) {
  .timer {
    top: 45%;
    transform: translate(-50%, -50%);
  }
}
</style>
</head>

<body>

<!-- видео фон -->
<video class="bg" autoplay muted loop playsinline>
  <source src="video/background.mp4" type="video/mp4">
</video>

<!-- музыка -->
<audio id="music" loop>
  <source src="audio/music.mp3" type="audio/mpeg">
</audio>

<!-- таймер -->
<div class="timer" id="timer">Загрузка...</div>

<script>
const targetDate = new Date("2026-12-31T00:00:00").getTime();

function updateTimer() {
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff <= 0) {
    document.getElementById("timer").innerHTML = "Время вышло!";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("timer").innerHTML =
    `${days}д ${hours}ч ${minutes}м ${seconds}с`;
}

updateTimer();
setInterval(updateTimer, 1000);

/* музыка: попытка автозапуска + запуск по клику */
window.addEventListener("load", () => {
  const music = document.getElementById("music");
  music.volume = 0.5;

  const playPromise = music.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {});
  }
});

document.addEventListener("click", () => {
  document.getElementById("music").play();
});
</script>

</body>
</html>

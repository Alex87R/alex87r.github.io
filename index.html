<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Background Video</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* без обрезки и "приближения" */
    }

    .content {
      position: relative;
      color: white;
      text-align: center;
      top: 40%;
      font-size: 24px;
    }
  </style>
</head>

<body>

  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="background.mp4" type="video/mp4">
    </video>
  </div>

  <div class="content">
    Ваш контент поверх видео
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Фоновое видео</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .bg-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content {
      position: relative;
      z-index: 1;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      top: 50%;
      transform: translateY(-50%);
    }
  </style>
</head>

<body>

  <div class="bg-video">
    <video autoplay muted loop playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>

  <div class="content">
    <h1>Твой текст здесь</h1>
  </div>

</body>
</html>
